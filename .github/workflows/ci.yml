name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check formatting with black
        run: |
          black --check --diff bin/ tests/ || echo "::warning::Code formatting issues found"

      - name: Check import sorting with isort
        run: |
          isort --check-only --diff bin/ tests/ || echo "::warning::Import sorting issues found"

      - name: Lint with flake8
        run: |
          flake8 bin/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 bin/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
